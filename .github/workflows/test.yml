name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # obsidian pins @codemirror/state, so peer resolution needs the legacy flag
      - run: npm install --legacy-peer-deps --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run i18n
      - run: npm run build
      # N2 release-integrity guard: the committed bundle must match a fresh
      # build of the committed sources (it drifted a release behind twice
      # before v3.7.1). Reproducible because package-lock.json pins esbuild.
      - name: Committed main.js must be fresh
        run: git diff --exit-code -- main.js
